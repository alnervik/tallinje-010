<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tallinjen 0–10</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4f8;
    --card: #ffffff;
    --primary: #4a7c59;
    --primary-light: #e8f0eb;
    --accent: #d4875e;
    --accent-light: #fdf0e8;
    --text: #2d3748;
    --text-light: #718096;
    --correct: #48bb78;
    --correct-bg: #f0fff4;
    --wrong: #f56565;
    --wrong-bg: #fff5f5;
    --line-color: #a0aec0;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .header {
    text-align: center;
    margin-bottom: 16px;
  }

  .header h1 {
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--primary);
    letter-spacing: -0.5px;
  }

  .header p {
    font-size: 0.95rem;
    color: var(--text-light);
    margin-top: 2px;
  }

  .progress-bar-container {
    width: 100%;
    max-width: 600px;
    height: 18px;
    background: #e2e8f0;
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 24px;
    position: relative;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), #68d391);
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    min-width: 0;
  }

  .progress-label {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--text);
  }

  .number-line-container {
    width: 100%;
    max-width: 650px;
    background: var(--card);
    border-radius: 20px;
    padding: 32px 24px 28px;
    box-shadow: var(--shadow);
    margin-bottom: 24px;
  }

  .prompt {
    text-align: center;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 24px;
  }

  .number-line {
    position: relative;
    width: 100%;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 8px;
  }

  .line-bg {
    position: absolute;
    top: 50%;
    left: 8px;
    right: 8px;
    height: 4px;
    background: var(--line-color);
    border-radius: 2px;
    transform: translateY(-50%);
  }

  .tick {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .tick-mark {
    width: 3px;
    height: 16px;
    background: var(--line-color);
    border-radius: 2px;
  }

  .tick-label {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    transition: all 0.3s ease;
  }

  .tick-label.hidden-number {
    color: transparent;
    background: transparent;
  }

  .tick-label.question-mark {
    background: var(--accent-light);
    color: var(--accent);
    font-size: 1.2rem;
    font-weight: 800;
    animation: pulse-soft 2s ease-in-out infinite;
    border: 2px solid var(--accent);
  }

  .tick-label.question-mark.active {
    background: var(--accent);
    color: white;
    animation: pulse-active 1s ease-in-out infinite;
    transform: scale(1.1);
  }

  .tick-label.revealed {
    background: var(--correct-bg);
    color: var(--correct);
    border: 2px solid var(--correct);
    animation: pop-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes pulse-soft {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  @keyframes pulse-active {
    0%, 100% { transform: scale(1.1); }
    50% { transform: scale(1.18); }
  }

  @keyframes pop-in {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .answers-container {
    width: 100%;
    max-width: 650px;
    background: var(--card);
    border-radius: 20px;
    padding: 24px;
    box-shadow: var(--shadow);
  }

  .answers-label {
    text-align: center;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text-light);
    margin-bottom: 16px;
  }

  .answers-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
  }

  .answer-btn {
    width: 68px;
    height: 68px;
    border: 3px solid #e2e8f0;
    border-radius: 16px;
    background: white;
    font-family: 'Nunito', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }

  .answer-btn:hover {
    border-color: var(--primary);
    background: var(--primary-light);
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }

  .answer-btn:active {
    transform: translateY(0) scale(0.96);
  }

  .answer-btn.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
    color: var(--correct);
    animation: bounce-correct 0.5s ease;
  }

  .answer-btn.wrong {
    border-color: var(--wrong);
    background: var(--wrong-bg);
    color: var(--wrong);
    animation: shake 0.5s ease;
  }

  .answer-btn.disabled {
    pointer-events: none;
    opacity: 0.5;
  }

  @keyframes bounce-correct {
    0% { transform: scale(1); }
    30% { transform: scale(1.15); }
    60% { transform: scale(0.95); }
    100% { transform: scale(1); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(4px); }
  }

  /* Completion screen */
  .completion-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }

  .completion-overlay.visible {
    display: flex;
  }

  .completion-card {
    background: white;
    border-radius: 28px;
    padding: 48px 40px;
    text-align: center;
    box-shadow: var(--shadow-lg);
    max-width: 380px;
    width: 100%;
    animation: scale-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes scale-in {
    0% { transform: scale(0.6); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .completion-star {
    font-size: 4rem;
    margin-bottom: 16px;
    animation: spin-star 1s ease;
  }

  @keyframes spin-star {
    0% { transform: rotate(-30deg) scale(0); }
    60% { transform: rotate(10deg) scale(1.2); }
    100% { transform: rotate(0deg) scale(1); }
  }

  .completion-card h2 {
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--primary);
    margin-bottom: 8px;
  }

  .completion-card p {
    font-size: 1rem;
    color: var(--text-light);
    margin-bottom: 28px;
  }

  .btn-continue {
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 16px 40px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .btn-continue:hover {
    background: #3d6a4c;
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }

  .btn-continue:active {
    transform: translateY(0) scale(0.97);
  }

  /* Streak indicator */
  .streak-reset-msg {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: var(--wrong);
    color: white;
    padding: 16px 32px;
    border-radius: 16px;
    font-weight: 700;
    font-size: 1.1rem;
    z-index: 50;
    pointer-events: none;
    opacity: 0;
    transition: all 0.3s ease;
  }

  .streak-reset-msg.visible {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }

  /* Feedback flash on the number line area */
  .number-line-container.flash-correct {
    animation: flash-green 0.6s ease;
  }

  .number-line-container.flash-wrong {
    animation: flash-red 0.6s ease;
  }

  @keyframes flash-green {
    0% { box-shadow: var(--shadow); }
    30% { box-shadow: 0 0 0 4px rgba(72, 187, 120, 0.4); }
    100% { box-shadow: var(--shadow); }
  }

  @keyframes flash-red {
    0% { box-shadow: var(--shadow); }
    30% { box-shadow: 0 0 0 4px rgba(245, 101, 101, 0.4); }
    100% { box-shadow: var(--shadow); }
  }

  @media (max-width: 500px) {
    .tick-label { font-size: 0.9rem; width: 26px; height: 26px; border-radius: 6px; }
    .tick-mark { height: 12px; }
    .answer-btn { width: 60px; height: 60px; font-size: 1.3rem; }
    .number-line-container { padding: 24px 12px 20px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Tallinjen 0–10</h1>
  <p>Vilket tal saknas?</p>
</div>

<div class="progress-bar-container">
  <div class="progress-bar" id="progressBar"></div>
  <span class="progress-label" id="progressLabel">0 / 5</span>
</div>

<div class="number-line-container" id="numberLineCard">
  <div class="prompt" id="prompt">Tryck på rätt svar!</div>
  <div class="number-line" id="numberLine">
    <div class="line-bg"></div>
  </div>
</div>

<div class="answers-container">
  <div class="answers-label">Välj rätt tal:</div>
  <div class="answers-grid" id="answersGrid"></div>
</div>

<div class="completion-overlay" id="completionOverlay">
  <div class="completion-card">
    <div class="completion-star">⭐</div>
    <h2>Bra jobbat!</h2>
    <p>Du klarade alla 5 rätt i rad!</p>
    <button class="btn-continue" onclick="resetGame()">Träna igen</button>
  </div>
</div>

<div class="streak-reset-msg" id="streakResetMsg">Försök igen från början!</div>

<script>
  // ===== CONFIGURATION =====
  const MIN_NUM = 0;
  const MAX_NUM = 10;
  const GOAL = 5; // correct in a row to complete

  // ===== STATE =====
  let streak = 0;
  let hiddenPositions = [];
  let currentQuestionIndex = 0;
  let answering = false;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function updateProgress() {
    const pct = Math.min((streak / GOAL) * 100, 100);
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = streak + ' / ' + GOAL;
  }

  function generateRound() {
    if (streak >= GOAL) {
      showCompletion();
      return;
    }

    answering = false;
    currentQuestionIndex = 0;

    // Pick 1-2 numbers to hide (never hide 0 or MAX_NUM for clarity)
    const hideCount = randomInt(1, 2);
    const candidates = [];
    for (let i = 1; i < MAX_NUM; i++) candidates.push(i);
    hiddenPositions = shuffle(candidates).slice(0, hideCount).sort((a, b) => a - b);

    renderNumberLine();
    renderAnswers();
    highlightCurrentQuestion();

    document.getElementById('prompt').textContent =
      hiddenPositions.length > 1 ? 'Vilka tal saknas?' : 'Vilket tal saknas?';
  }

  function renderNumberLine() {
    const container = document.getElementById('numberLine');
    container.innerHTML = '<div class="line-bg"></div>';

    for (let i = MIN_NUM; i <= MAX_NUM; i++) {
      const tick = document.createElement('div');
      tick.className = 'tick';

      const mark = document.createElement('div');
      mark.className = 'tick-mark';

      const label = document.createElement('div');
      label.className = 'tick-label';
      label.id = 'tick-' + i;

      if (hiddenPositions.includes(i)) {
        label.classList.add('question-mark');
        label.textContent = '?';
      } else {
        label.textContent = i;
      }

      tick.appendChild(mark);
      tick.appendChild(label);
      container.appendChild(tick);
    }
  }

  function highlightCurrentQuestion() {
    // Remove active from all
    hiddenPositions.forEach(pos => {
      const el = document.getElementById('tick-' + pos);
      if (el) el.classList.remove('active');
    });

    if (currentQuestionIndex < hiddenPositions.length) {
      const currentPos = hiddenPositions[currentQuestionIndex];
      const el = document.getElementById('tick-' + currentPos);
      if (el && el.classList.contains('question-mark')) {
        el.classList.add('active');
      }
    }
  }

  function renderAnswers() {
    const grid = document.getElementById('answersGrid');
    grid.innerHTML = '';

    // Collect all hidden answers + distractors
    const correctAnswers = [...hiddenPositions];
    const distractors = new Set();

    while (distractors.size < 3) {
      const d = randomInt(MIN_NUM, MAX_NUM);
      if (!correctAnswers.includes(d) && !distractors.has(d)) {
        distractors.add(d);
      }
    }

    const allOptions = shuffle([...correctAnswers, ...distractors]);

    allOptions.forEach(num => {
      const btn = document.createElement('button');
      btn.className = 'answer-btn';
      btn.textContent = num;
      btn.addEventListener('click', () => handleAnswer(btn, num));
      grid.appendChild(btn);
    });
  }

  function handleAnswer(btn, num) {
    if (answering) return;

    const currentCorrect = hiddenPositions[currentQuestionIndex];

    if (num === currentCorrect) {
      // Correct
      answering = true;
      btn.classList.add('correct');

      // Reveal on number line
      const tickEl = document.getElementById('tick-' + currentCorrect);
      tickEl.classList.remove('question-mark', 'active');
      tickEl.classList.add('revealed');
      tickEl.textContent = currentCorrect;

      document.getElementById('numberLineCard').classList.add('flash-correct');
      setTimeout(() => document.getElementById('numberLineCard').classList.remove('flash-correct'), 600);

      currentQuestionIndex++;

      if (currentQuestionIndex >= hiddenPositions.length) {
        // All questions in this round answered
        streak++;
        updateProgress();

        setTimeout(() => {
          generateRound();
        }, 800);
      } else {
        // More questions in this round
        setTimeout(() => {
          btn.classList.remove('correct');
          btn.classList.add('disabled');
          highlightCurrentQuestion();
          answering = false;
        }, 500);
      }
    } else {
      // Wrong
      answering = true;
      btn.classList.add('wrong');

      document.getElementById('numberLineCard').classList.add('flash-wrong');
      setTimeout(() => document.getElementById('numberLineCard').classList.remove('flash-wrong'), 600);

      if (streak > 0) {
        streak = 0;
        updateProgress();
        showStreakReset();
      }

      setTimeout(() => {
        btn.classList.remove('wrong');
        answering = false;
      }, 600);
    }
  }

  function showStreakReset() {
    const msg = document.getElementById('streakResetMsg');
    msg.classList.add('visible');
    setTimeout(() => msg.classList.remove('visible'), 1500);
  }

  function showCompletion() {
    document.getElementById('completionOverlay').classList.add('visible');
  }

  function resetGame() {
    document.getElementById('completionOverlay').classList.remove('visible');
    streak = 0;
    updateProgress();
    generateRound();
  }

  // ===== INIT =====
  updateProgress();
  generateRound();
</script>
</body>
</html>
